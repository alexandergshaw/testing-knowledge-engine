<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Schedule Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Course Schedule Builder</h1>
      <p class="tagline">Paste a course description, get a weekly topic schedule —
        built from published curricula, no AI involved.</p>
    </header>

    <form id="schedule-form" class="panel" autocomplete="off">
      <label for="description">Course description</label>
      <textarea id="description" rows="7" maxlength="5000" required
        placeholder="e.g. An introductory college course in Python programming. Students will learn the fundamentals of programming, covering variables, control flow, functions, data structures, file handling, and object-oriented programming."></textarea>

      <div class="form-row">
        <div class="weeks-field">
          <label for="weeks">Weeks in term</label>
          <input id="weeks" type="number" min="1" max="52" value="14" required>
        </div>
        <button type="submit" id="generate">Generate schedule</button>
      </div>
    </form>

    <section id="result" class="result" hidden>
      <div class="result-head">
        <h2 id="result-subject"></h2>
        <span id="result-confidence" class="confidence"></span>
      </div>
      <ol id="week-list" class="week-list"></ol>
      <div id="citations" class="citations"></div>
    </section>

    <p id="status" class="status" hidden></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
